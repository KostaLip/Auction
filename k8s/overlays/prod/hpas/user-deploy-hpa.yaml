apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: user-deploy-hpa
  namespace: auction
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: user-deploy
  minReplicas: 1
  maxReplicas: 3
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 120
    scaleDown:
      stabilizationWindowSeconds: 300
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
